<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>تول السورت</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#15181c;
    --panel:#1e2228;
    --panel-2:#252a31;
    --line:#343b44;
    --paper:#eef0f2;
    --sub:#9aa4b0;
    --yellow:#ffc400;
    --yellow-deep:#e6ab00;
    --green:#3ddc84;
    --red:#ff5a5f;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper);
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:520px;margin:0 auto;padding:16px 16px 140px;}

  /* header */
  header{
    display:flex;align-items:center;gap:10px;
    padding:14px 4px 18px;
  }
  .hazard{
    width:34px;height:34px;border-radius:8px;flex:none;
    background:repeating-linear-gradient(45deg,var(--yellow) 0 8px,#191b1e 8px 16px);
    box-shadow:0 0 0 2px var(--panel-2);
  }
  header h1{font-size:19px;font-weight:800;margin:0;letter-spacing:.2px;}
  header p{margin:2px 0 0;color:var(--sub);font-size:12.5px;}

  .status-row{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:9px 13px;margin-bottom:14px;
    font-size:12.5px;color:var(--sub);
  }
  .status-row button{
    background:none;border:1px solid var(--line);color:var(--paper);
    font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;
    padding:6px 12px;border-radius:8px;cursor:pointer;
  }
  .status-row button:active{background:var(--panel-2);}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-left:6px;}
  .dot.ok{background:var(--green);}
  .dot.bad{background:var(--red);}
  .dot.loading{background:var(--yellow);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* card */
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .card h2{
    font-size:11.5px;font-weight:700;color:var(--sub);
    text-transform:uppercase;letter-spacing:.06em;
    margin:0 0 12px;display:flex;align-items:center;gap:8px;
  }
  .card h2 .num{
    background:var(--yellow);color:#1a1a1a;font-weight:800;
    width:18px;height:18px;border-radius:5px;
    display:inline-flex;align-items:center;justify-content:center;
    font-size:11px;font-family:'IBM Plex Mono',monospace;
  }

  .field{margin-bottom:10px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:12px;color:var(--sub);margin-bottom:6px;font-weight:600;}
  .field input{
    width:100%;background:var(--panel-2);border:1px solid var(--line);
    color:var(--paper);font-family:'Cairo',sans-serif;font-size:15px;font-weight:600;
    padding:12px 13px;border-radius:10px;outline:none;
  }
  .field input:focus{border-color:var(--yellow);}
  .field input::placeholder{color:#5b6270;font-weight:400;}
  .clear-btn{
    position:relative;
  }
  .field-wrap{position:relative;}
  .x-btn{
    position:absolute;left:8px;top:50%;transform:translateY(-50%);
    background:var(--line);color:var(--paper);border:none;
    width:22px;height:22px;border-radius:6px;font-size:13px;cursor:pointer;
    display:none;align-items:center;justify-content:center;line-height:1;
  }
  .x-btn.show{display:flex;}

  .picked-sku{
    margin-top:10px;background:var(--panel-2);border:1px solid var(--line);
    border-radius:10px;padding:11px 13px;font-size:13px;
    display:none;
  }
  .picked-sku.show{display:block;}
  .picked-sku .name{font-weight:700;font-size:14px;margin-bottom:2px;}
  .picked-sku .meta{color:var(--sub);font-size:11.5px;font-family:'IBM Plex Mono',monospace;}
  .picked-sku .loc-tag{
    display:inline-block;margin-top:7px;background:var(--yellow);color:#1a1a1a;
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:700;
    padding:3px 8px;border-radius:6px;
  }
  .picked-sku .loc-tag.none{background:var(--line);color:var(--sub);}

  /* scan section */
  .scan-card{
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:16px;margin-bottom:14px;opacity:.45;pointer-events:none;transition:opacity .2s;
  }
  .scan-card.active{opacity:1;pointer-events:auto;}
  .scan-input-row{display:flex;gap:8px;}
  .scan-input-row input{
    flex:1;background:var(--panel-2);border:2px solid var(--line);
    color:var(--paper);font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:600;
    padding:13px 13px;border-radius:10px;outline:none;letter-spacing:.5px;
  }
  .scan-input-row input:focus{border-color:var(--yellow);}
  .scan-go{
    background:var(--yellow);border:none;color:#1a1a1a;font-weight:800;
    padding:0 18px;border-radius:10px;cursor:pointer;font-family:'Cairo',sans-serif;font-size:14px;
  }
  .scan-go:active{background:var(--yellow-deep);}

  /* yellow result box */
  .result-box{
    border-radius:var(--radius);
    padding:18px;margin-bottom:14px;
    display:none;
    background:repeating-linear-gradient(135deg,#ffc400 0 14px,#ffcf2e 14px 28px);
    color:#191b1e;
    position:relative;
    overflow:hidden;
  }
  .result-box.show{display:block;}
  .result-box.error{background:none;background-color:#2a1416;border:2px solid var(--red);color:var(--paper);}
  .result-box .inner{
    background:#191b1e;border-radius:10px;padding:15px 16px;
  }
  .result-box.error .inner{background:transparent;padding:2px 2px;}
  .rb-status{
    display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;margin-bottom:10px;
    color:var(--yellow);
  }
  .result-box.error .rb-status{color:var(--red);}
  .rb-status .icon{
    width:22px;height:22px;border-radius:50%;background:var(--yellow);color:#1a1a1a;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;
  }
  .result-box.error .rb-status .icon{background:var(--red);color:#fff;}
  .rb-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px dashed #333;font-size:13px;}
  .rb-row:last-child{border-bottom:none;}
  .rb-row .k{color:#8b93a0;}
  .rb-row .v{font-weight:700;color:#f2f4f6;font-family:'IBM Plex Mono',monospace;}
  .rb-big-loc{
    font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:800;
    color:var(--yellow);text-align:center;padding:10px 0 4px;letter-spacing:1px;
  }
  .rb-hint{font-size:12px;color:var(--sub);text-align:center;margin-top:6px;}

  /* log */
  .log-title{font-size:11.5px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin:22px 4px 10px;}
  .log-item{
    display:flex;align-items:center;gap:10px;
    background:var(--panel);border:1px solid var(--line);border-radius:11px;
    padding:10px 12px;margin-bottom:8px;font-size:12.5px;
  }
  .log-item .badge{
    width:8px;height:8px;border-radius:50%;flex:none;
  }
  .log-item .badge.ok{background:var(--green);}
  .log-item .badge.bad{background:var(--red);}
  .log-item .txt{flex:1;min-width:0;}
  .log-item .txt .t1{font-weight:700;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .log-item .txt .t2{color:var(--sub);font-family:'IBM Plex Mono',monospace;font-size:11px;}
  .log-item .time{color:#5b6270;font-family:'IBM Plex Mono',monospace;font-size:10.5px;flex:none;}
  .empty-log{color:#5b6270;font-size:12.5px;text-align:center;padding:18px 0;}

  /* bottom sheet */
  .sheet-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.5);
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;
  }
  .sheet-overlay.show{opacity:1;pointer-events:auto;}
  .sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:41;
    max-width:520px;margin:0 auto;
    background:var(--panel);
    border:1px solid var(--line);
    border-bottom:none;
    border-radius:20px 20px 0 0;
    transform:translateY(100%);
    transition:transform .28s cubic-bezier(.32,.72,0,1);
    max-height:78vh;
    display:flex;flex-direction:column;
  }
  .sheet.show{transform:translateY(0);}
  .sheet-handle-area{
    padding:12px 0 8px;display:flex;flex-direction:column;align-items:center;gap:10px;
    cursor:grab;touch-action:none;flex:none;
  }
  .sheet-handle{width:42px;height:5px;border-radius:3px;background:var(--line);}
  .sheet-handle-area .lbl{font-size:11.5px;color:var(--sub);font-weight:700;}
  .sheet-body{overflow-y:auto;padding:2px 18px 26px;}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .detail-cell{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 11px;}
  .detail-cell .k{font-size:10.5px;color:var(--sub);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em;}
  .detail-cell .v{font-size:13.5px;font-weight:700;font-family:'IBM Plex Mono',monospace;word-break:break-word;}
  .detail-cell.wide{grid-column:1 / -1;}

  /* fixed drag tab always visible once a match is picked */
  .peek-tab{
    position:fixed;left:0;right:0;bottom:0;z-index:39;
    max-width:520px;margin:0 auto;
    background:var(--panel);border:1px solid var(--line);border-bottom:none;
    border-radius:16px 16px 0 0;
    padding:11px 18px;
    display:none;align-items:center;justify-content:center;gap:8px;
    cursor:pointer;
    box-shadow:0 -8px 24px rgba(0,0,0,.35);
  }
  .peek-tab.show{display:flex;}
  .peek-tab .sheet-handle{margin-bottom:0;}
  .peek-tab span{font-size:12.5px;font-weight:700;color:var(--sub);}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px;}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="hazard"></div>
    <div>
      <h1>تول السورت</h1>
      <p>اختار الصنف، بعدين اسكان اللوكيشن للتأكيد</p>
    </div>
  </header>

  <div class="status-row">
    <span id="statusText"><span class="dot loading" id="statusDot"></span>بيحمل الداتا من الشيت...</span>
    <div style="display:flex;gap:8px;">
      <button id="newSortBtn" style="background:var(--yellow);border:none;color:#1a1a1a;font-family:'Cairo',sans-serif;font-size:12px;font-weight:800;padding:6px 12px;border-radius:8px;cursor:pointer;">↻ سورت جديد</button>
      <button id="resetAllBtn" style="background:#c62828;border:none;color:#fff;font-family:'Cairo',sans-serif;font-size:12px;font-weight:800;padding:6px 12px;border-radius:8px;cursor:pointer;">🗑 Reset</button>
<button id="refreshBtn">تحديث</button>
    </div>
  </div>

  <!-- Step 1: business -->
  <div class="card">
    <h2><span class="num">1</span>البيزنس (اختياري)</h2>
    <div class="field">
      <div class="field-wrap">
        <input list="businessList" id="businessInput" placeholder="اكتب اسم البيزنس..." autocomplete="off">
        <button class="x-btn" id="clearBusiness">✕</button>
      </div>
      <datalist id="businessList"></datalist>
    </div>
  </div>

  <!-- Step 2: sku -->
  <div class="card">
    <h2><span class="num">2</span>الـ SKU</h2>
    <div class="field">
      <div class="field-wrap">
        <input list="skuList" id="skuInput" placeholder="اكتب كود الـ SKU أو الاسم..." autocomplete="off">
        <button class="x-btn" id="clearSku">✕</button>
      </div>
      <datalist id="skuList"></datalist>
    </div>
    <div class="picked-sku" id="pickedSku"></div>
  </div>

  <!-- Step 3: scan -->
  <div class="scan-card" id="scanCard">
    <h2><span class="num">3</span>سكان اللوكيشن</h2>
    <div class="scan-input-row">
      <input type="text" id="scanInput" placeholder="سكان أو اكتب باركود اللوكيشن" autocomplete="off">
      <button class="scan-go" id="scanGo">تأكيد</button>
    </div>
  </div>

  <!-- result -->
  <div class="result-box" id="resultBox"></div>

  <div class="log-title">آخر عمليات السورت</div>
  <div id="logList"><div class="empty-log">لسه معملتش أي عملية سورت</div></div>
</div>

<div class="peek-tab" id="peekTab">
  <div class="sheet-handle"></div>
  <span>اسحب لفوق لعرض التفاصيل</span>
</div>

<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle-area" id="sheetHandleArea">
    <div class="sheet-handle"></div>
    <div class="lbl">تفاصيل الصنف</div>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<script>
const SHEET_ID = "1ASWNnxtHze8xmeWd95dD3R_Otq-1S04lOHqCTuFkwis";
const SHEET_TAB_NAME = "Cycle";
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB_NAME)}`;

let rows = [];               // all parsed rows
let businesses = [];         // unique business names
let skuIndex = [];           // {code,name,business,label}
let currentSkuObj = null;    // {code, name, business} of the chosen sku
let currentAssignment = null;// {location, updatedAt} built inside the tool, not from the sheet
let currentBusiness = "";
let currentSkuCode = "";
let sessionLog = [];

const el = (id)=>document.getElementById(id);
const statusText = el('statusText');
const statusDot = el('statusDot');
const businessInput = el('businessInput');
const businessList = el('businessList');
const skuInput = el('skuInput');
const skuList = el('skuList');
const pickedSku = el('pickedSku');
const scanCard = el('scanCard');
const scanInput = el('scanInput');
const resultBox = el('resultBox');
const logList = el('logList');
const sheet = el('sheet');
const sheetBody = el('sheetBody');
const sheetOverlay = el('sheetOverlay');
const peekTab = el('peekTab');

function norm(s){ return (s||"").toString().trim(); }
function normLower(s){ return norm(s).toLowerCase(); }

async function loadData(){
  statusDot.className = 'dot loading';
  statusText.innerHTML = '<span class="dot loading" id="statusDot"></span>بيحمل الداتا من الشيت...';
  try{
    const res = await fetch(SHEET_CSV_URL, {cache:"no-store"});
    if(!res.ok) throw new Error("fetch failed");
    const text = await res.text();
    const parsed = Papa.parse(text, {header:true, skipEmptyLines:true});
    rows = parsed.data.filter(r => norm(r['SELLER SKU CODE']));
    buildIndexes();
    statusText.innerHTML = `<span class="dot ok"></span>${rows.length} صف متحمل`;
  }catch(err){
    statusText.innerHTML = `<span class="dot bad"></span>فشل تحميل الشيت`;
    console.error(err);
  }
}

function buildIndexes(){
  const bset = new Set();
  const seenSku = new Set();
  skuIndex = [];
  rows.forEach(r=>{
    const b = norm(r['SELLER NAME']);
    if(b) bset.add(b);
    const code = norm(r['SELLER SKU CODE']);
    const name = norm(r['SKU NAME']);
    const key = code+'||'+b;
    if(code && !seenSku.has(key)){
      seenSku.add(key);
      skuIndex.push({code, name, business:b, label: `${code} — ${name}`});
    }
  });
  businesses = [...bset].sort((a,b)=>a.localeCompare(b,'ar'));
  businessList.innerHTML = businesses.map(b=>`<option value="${escapeHtml(b)}">`).join('');
  renderSkuList();
}

function escapeHtml(s){
  return (s||"").toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderSkuList(){
  const b = norm(businessInput.value);
  let list = skuIndex;
  if(b) list = list.filter(s => s.business === b);
  // dedupe by code (keep label from filtered business if matched, else first)
  const seen = new Set();
  const out = [];
  list.forEach(s=>{
    if(!seen.has(s.code)){ seen.add(s.code); out.push(s); }
  });
  out.sort((a,c)=>a.code.localeCompare(c.code));
  skuList.innerHTML = out.slice(0,400).map(s=>`<option value="${escapeHtml(s.code)}">${escapeHtml(s.name)}</option>`).join('');
}

businessInput.addEventListener('input', ()=>{
  el('clearBusiness').classList.toggle('show', !!businessInput.value);
  renderSkuList();
  // if current sku no longer fits business, reset target
  resetTarget();
});
el('clearBusiness').addEventListener('click', ()=>{
  businessInput.value=''; el('clearBusiness').classList.remove('show');
  renderSkuList(); resetTarget();
});

skuInput.addEventListener('change', tryPickSku);
skuInput.addEventListener('input', ()=>{
  el('clearSku').classList.toggle('show', !!skuInput.value);
  tryPickSku();
});
el('clearSku').addEventListener('click', ()=>{
  skuInput.value=''; el('clearSku').classList.remove('show');
  resetTarget();
});

function tryPickSku(){
  const val = norm(skuInput.value);
  if(!val){ resetTarget(); return; }
  const b = norm(businessInput.value);
  // find exact code match, optionally scoped to business
  let candidates = skuIndex.filter(s => s.code.toLowerCase() === val.toLowerCase());
  if(b) candidates = candidates.filter(s=>s.business===b);
  if(candidates.length === 0) { resetTarget(); return; }
  // pick first candidate business if user hasn't set one
  const chosen = candidates[0];
  currentSkuCode = chosen.code;
  currentBusiness = b || chosen.business;
  if(!b) businessInput.value = chosen.business;
  currentSkuObj = chosen;
  showPicked(chosen);
}

// ---- assignment storage: purely built inside the tool, not from the sheet ----
// shared:true so every user of this tool sees the same location assignments
function assignmentKey(business, code){
  return `loc:${business}||${code}`.slice(0,190);
}
async function getAssignment(business, code){
  try{
    const r = await window.storage.get(assignmentKey(business, code), true);
    return (r && r.value) ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function setAssignment(business, code, location){
  const payload = {location, updatedAt: new Date().toISOString()};
  try{ await window.storage.set(assignmentKey(business, code), JSON.stringify(payload), true); }catch(e){}
  return payload;
}
async function clearAssignment(business, code){
  try{ await window.storage.delete(assignmentKey(business, code), true); }catch(e){}
}

async function showPicked(chosen){
  pickedSku.classList.add('show');
  pickedSku.innerHTML = `
    <div class="name">${escapeHtml(chosen.name || chosen.code)}</div>
    <div class="meta">${escapeHtml(currentBusiness)} · ${escapeHtml(chosen.code)}</div>
    <span class="loc-tag none">بيدوّر على تسجيل سابق...</span>
  `;
  scanCard.classList.add('active');
  peekTab.classList.remove('show');
  resultBox.classList.remove('show');

  currentAssignment = await getAssignment(currentBusiness, currentSkuCode);
  pickedSku.innerHTML = `
    <div class="name">${escapeHtml(chosen.name || chosen.code)}</div>
    <div class="meta">${escapeHtml(currentBusiness)} · ${escapeHtml(chosen.code)}</div>
    ${ currentAssignment
        ? `<span class="loc-tag">📍 ${escapeHtml(currentAssignment.location)}</span>`
        : `<span class="loc-tag none">مفيش لوكيشن متسجل - أول مرة</span>` }
  `;
  if(currentAssignment){ peekTab.classList.add('show'); }
  setTimeout(()=>scanInput.focus(), 50);
}

function resetTarget(){
  currentSkuObj = null;
  currentAssignment = null;
  currentSkuCode = '';
  currentBusiness = '';
  pickedSku.classList.remove('show');
  scanCard.classList.remove('active');
  peekTab.classList.remove('show');
  closeSheet();
  resultBox.classList.remove('show');
}

async function confirmScan(){
  const scanned = norm(scanInput.value);
  if(!scanned || !currentSkuObj) return;
  const skuName = currentSkuObj.name || '';
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});

  // re-check fresh in case another device already assigned it
  const fresh = await getAssignment(currentBusiness, currentSkuCode);

  if(!fresh){
    currentAssignment = await setAssignment(currentBusiness, currentSkuCode, scanned);
    renderResult({ok:true, brandNew:true, scanned, skuName});
    pushLog(true, `${currentSkuCode} — لوكيشن جديد`, scanned, timeStr);
  } else if(fresh.location.toLowerCase() === scanned.toLowerCase()){
    currentAssignment = fresh;
    renderResult({ok:true, brandNew:false, scanned, skuName});
    pushLog(true, `${currentSkuCode} — نفس اللوكيشن`, scanned, timeStr);
  } else {
    currentAssignment = fresh;
    renderResult({ok:false, scanned, correct:[fresh.location], skuName});
    pushLog(false, `${currentSkuCode} — لوكيشن غلط`, scanned, timeStr);
  }
  scanInput.value = '';
  peekTab.classList.add('show');
  // refresh the small tag under the sku field too
  pickedSku.querySelector('.loc-tag, .loc-tag.none')?.replaceWith((()=>{
    const span = document.createElement('span');
    if(currentAssignment){ span.className='loc-tag'; span.textContent = `📍 ${currentAssignment.location}`; }
    else { span.className='loc-tag none'; span.textContent='مفيش لوكيشن متسجل - أول مرة'; }
    return span;
  })());
}

function renderResult(r){
  resultBox.classList.add('show');
  if(r.ok){
    resultBox.classList.remove('error');
    resultBox.innerHTML = `
      <div class="inner">
        <div class="rb-status"><span class="icon">✓</span>تم السورت صح</div>
        <div class="rb-big-loc">${escapeHtml(r.scanned)}</div>
        <div class="rb-row"><span class="k">الـ SKU</span><span class="v">${escapeHtml(currentSkuCode)}</span></div>
        <div class="rb-row"><span class="k">اسم الصنف</span><span class="v">${escapeHtml(r.skuName)}</span></div>
        <div class="rb-row"><span class="k">البيزنس</span><span class="v">${escapeHtml(currentBusiness)}</span></div>
        <div class="rb-hint">${r.brandNew ? 'أول مرة يتسجل لوكيشن للصنف ده' : 'مطابق للوكيشن المسجل بالفعل'}</div>
      </div>`;
  } else {
    resultBox.classList.add('error');
    resultBox.innerHTML = `
      <div class="rb-status"><span class="icon">!</span>لازم تسكان نفس اللوكيشن</div>
      <div class="rb-row"><span class="k">اللي انت سكانته</span><span class="v" style="color:var(--red)">${escapeHtml(r.scanned)}</span></div>
      <div class="rb-row"><span class="k">اللوكيشن الصح</span><span class="v" style="color:var(--yellow)">${r.correct.map(escapeHtml).join(' / ')}</span></div>
      <div class="rb-hint">الصنف ده مسجل بالفعل على لوكيشن تاني — سكان نفس اللوكيشن المسجل عشان تأكد السورت</div>
    `;
  }
}

function pushLog(ok, title, loc, time){
  sessionLog.unshift({ok, title, loc, time});
  sessionLog = sessionLog.slice(0,25);
  renderLog();
  saveLog();
}

function renderLog(){
  if(sessionLog.length===0){ logList.innerHTML = '<div class="empty-log">لسه معملتش أي عملية سورت</div>'; return; }
  logList.innerHTML = sessionLog.map(l=>`
    <div class="log-item">
      <span class="badge ${l.ok?'ok':'bad'}"></span>
      <div class="txt">
        <div class="t1">${escapeHtml(l.title)}</div>
        <div class="t2">${escapeHtml(l.loc)}</div>
      </div>
      <span class="time">${escapeHtml(l.time)}</span>
    </div>
  `).join('');
}

async function saveLog(){
  try{ await window.storage.set('sort-tool:log', JSON.stringify(sessionLog)); }catch(e){}
}
async function loadLog(){
  try{
    const r = await window.storage.get('sort-tool:log');
    if(r && r.value){ sessionLog = JSON.parse(r.value); renderLog(); }
  }catch(e){}
}

// details bottom sheet — shows the assignment this tool itself built, not sheet data
function renderDetails(){
  if(!currentSkuObj){ sheetBody.innerHTML=''; return; }
  const a = currentAssignment;
  const when = a ? new Date(a.updatedAt).toLocaleString('ar-EG',{dateStyle:'medium', timeStyle:'short'}) : '—';
  sheetBody.innerHTML = `
    <div class="detail-grid" style="margin-top:6px;">
      <div class="detail-cell wide"><div class="k">الـ SKU</div><div class="v">${escapeHtml(currentSkuObj.code)}</div></div>
      <div class="detail-cell wide"><div class="k">اسم الصنف</div><div class="v">${escapeHtml(currentSkuObj.name || '—')}</div></div>
      <div class="detail-cell wide"><div class="k">البيزنس</div><div class="v">${escapeHtml(currentBusiness)}</div></div>
      <div class="detail-cell wide"><div class="k">اللوكيشن المتسجل</div><div class="v">${a ? escapeHtml(a.location) : 'مفيش لسه'}</div></div>
      <div class="detail-cell wide"><div class="k">آخر تحديث</div><div class="v" style="font-size:12px;">${escapeHtml(when)}</div></div>
    </div>
    ${a ? `<button id="clearAssignBtn" style="width:100%;margin-top:14px;background:var(--panel-2);border:1px solid var(--red);color:var(--red);font-family:'Cairo',sans-serif;font-weight:700;font-size:13px;padding:11px;border-radius:10px;cursor:pointer;">امسح التسجيل ده</button>` : ''}
  `;
  const btn = el('clearAssignBtn');
  if(btn){
    btn.addEventListener('click', async ()=>{
      btn.disabled = true; btn.textContent = 'جاري المسح...';
      await clearAssignment(currentBusiness, currentSkuCode);
      currentAssignment = null;
      resultBox.classList.remove('show');
      showPicked(currentSkuObj);
      closeSheet();
    });
  }
}

function openSheet(){
  if(!currentSkuObj) return;
  renderDetails();
  sheet.classList.add('show');
  sheetOverlay.classList.add('show');
}
function closeSheet(){
  sheet.classList.remove('show');
  sheetOverlay.classList.remove('show');
}

peekTab.addEventListener('click', openSheet);
sheetOverlay.addEventListener('click', closeSheet);

// drag to close
let dragStartY=null, sheetStartTransform=0;
const handleArea = el('sheetHandleArea');
function dragStart(y){ dragStartY=y; sheet.style.transition='none'; }
function dragMove(y){
  if(dragStartY===null) return;
  const dy = Math.max(0, y-dragStartY);
  sheet.style.transform = `translateY(${dy}px)`;
}
function dragEnd(y){
  if(dragStartY===null) return;
  const dy = y-dragStartY;
  sheet.style.transition='';
  sheet.style.transform='';
  if(dy>90) closeSheet();
  dragStartY=null;
}
handleArea.addEventListener('touchstart', e=>dragStart(e.touches[0].clientY), {passive:true});
handleArea.addEventListener('touchmove', e=>dragMove(e.touches[0].clientY), {passive:true});
handleArea.addEventListener('touchend', e=>dragEnd(e.changedTouches[0].clientY));
handleArea.addEventListener('mousedown', e=>{
  dragStart(e.clientY);
  const mm = ev=>dragMove(ev.clientY);
  const mu = ev=>{ dragEnd(ev.clientY); document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); };
  document.addEventListener('mousemove',mm);
  document.addEventListener('mouseup',mu);
});

scanInput.addEventListener('keydown', e=>{ if(e.key==='Enter') confirmScan(); });
el('scanGo').addEventListener('click', confirmScan);
el('refreshBtn').addEventListener('click', loadData);
el('newSortBtn').addEventListener('click', ()=>{
  businessInput.value = '';
  skuInput.value = '';
  el('clearBusiness').classList.remove('show');
  el('clearSku').classList.remove('show');
  renderSkuList();
  resetTarget();
  businessInput.focus();
});

el('resetAllBtn').addEventListener('click',()=>{
if(!confirm('سيتم حذف جميع اللوكيشنات واللوج. هل أنت متأكد؟')) return;
Object.keys(localStorage).forEach(k=>{if(k.startsWith('loc:')) localStorage.removeItem(k);});
localStorage.removeItem('sort-tool:log');
sessionLog=[];renderLog();resetTarget();
businessInput.value='';skuInput.value='';renderSkuList();
alert('تم عمل Reset بنجاح');
});

loadData();
loadLog();
</script>
</body>
</html>
